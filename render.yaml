services:
  - type: web
    name: tripai-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        fromDatabase:
          name: tripai-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tripai-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: tripai-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: tripai-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: tripai-db
          property: password
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false

databases:
  - name: tripai-db
    databaseName: tripai
    user: tripai_user
    plan: free
