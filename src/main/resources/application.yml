spring:
  application:
    name: tripai
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tripai}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-32-chars-minimum}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  openai:
    api-key: ${OPENAI_API_KEY:}
  google:
    places-api-key: ${GOOGLE_PLACES_API_KEY:}
  openweather:
    api-key: ${OPENWEATHER_API_KEY:}
